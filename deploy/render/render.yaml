## HTMLess Render Blueprint
## Deploy: https://render.com/deploy?repo=https://github.com/HTMLess-CMS/HTMLess

services:
  # ─── API Server ───
  - type: web
    name: htmless-api
    runtime: docker
    dockerfilePath: ./Dockerfile.api
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: htmless-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: htmless-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"

  # ─── Admin UI ───
  - type: web
    name: htmless-admin
    runtime: docker
    dockerfilePath: ./Dockerfile.admin
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: htmless-api
          type: web
          property: hostport

  # ─── Worker ───
  - type: worker
    name: htmless-worker
    runtime: docker
    dockerfilePath: ./Dockerfile.worker
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: htmless-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: htmless-redis
          type: redis
          property: connectionString
      - key: NODE_ENV
        value: production

  # ─── Redis ───
  - type: redis
    name: htmless-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  - name: htmless-db
    databaseName: htmless
    plan: free
